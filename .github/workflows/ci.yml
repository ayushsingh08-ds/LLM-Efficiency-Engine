name: ci

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch==2.5.1+cpu
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: |
          python -m unittest discover -s tests -p "test_knn_router.py"
          python -m unittest discover -s tests -p "test_phase3_pipeline.py"
