version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: llm_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llm_logs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  fastapi:
    build: .
    container_name: llm_fastapi
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_NAME: llm_logs
      DB_USER: postgres
      DB_PASSWORD: postgres
      env_file:
        - .env

volumes:
  postgres_data: