services:

  postgres:
    image: postgres:15
    container_name: llm_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llm_logs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  fastapi:
    image: llm-efficiency-engine-fastapi:latest
    build: .
    container_name: llm_fastapi
    depends_on:
      - postgres
      - redis
      - milvus
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_NAME: llm_logs
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_CACHE_TTL_SECONDS: "86400"
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      MILVUS_COLLECTION: semantic_cache
      CACHE_SIMILARITY_THRESHOLD: "0.95"
      MILVUS_CACHE_TTL_SECONDS: "604800"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: llm_grafana
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    restart: always

  redis:
    image: redis:7-alpine
    container_name: llm_redis
    restart: always
    ports:
      - "6379:6379"

  etcd:
    container_name: milvus_etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    volumes:
      - milvus_etcd:/etcd

  minio:
    container_name: milvus_minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - milvus_minio:/minio_data
    ports:
      - "9000:9000"
      - "9001:9001"

  milvus:
    container_name: milvus_standalone
    image: milvusdb/milvus:v2.4.4
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd
      - minio
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"

volumes:
  postgres_data:
  milvus_etcd:
  milvus_minio:
  milvus_data: